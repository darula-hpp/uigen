version: '1.0'
enabled: {}
defaults: {}
annotations:
  POST:/api/v1/auth/login:
    x-uigen-login: true
    x-uigen-label: User Login
  POST:/api/v1/auth/password-reset:
    x-uigen-password-reset: true
  POST:/api/v1/auth/sign-up:
    x-uigen-signup: true
  GET:/health:
    x-uigen-ignore: true
  Body_create_meeting_api_v1_meetings_post.recording:
    x-uigen-max-file-size: 62914560
  Body_upload_template_api_v1_templates_post.file:
    x-uigen-max-file-size: 62914560
relationships:
  - source: templates
    target: meetings
    path: /api/v1/meetings/{meeting_id}/templates/{template_id}
    type: hasMany
  - source: meetings
    target: generate-documents
    path: /api/v1/meetings/{meeting_id}/generate-documents
    type: hasMany
canvasLayout:
  positions:
    generate-ai-data:
      x: 691
      'y': 88
